<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../styles/styles.css">
    <link rel="stylesheet" type="text/css" href="../styles/fun.css">
    <link rel="stylesheet" type="text/css" href="../styles/resume.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/robot-svgrepo-com.svg"> 
    <title>Portfolio</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script>
        // SOURCED FROM: https://dev.to/mattmarquise/how-to-create-a-custom-circular-cursor-for-your-website-4i7p
        $(document).ready(function() {
            $(document).on('mousemove', function(e) {
                $('#circularcursor').css({
                    left: e.pageX,
                    top: e.pageY
                });
            });
            
            // Set the default PDF to English on page load
            downloadPDF('EN');
        });
    </script>
</head>
<body>
    
    <div id="circularcursor"></div>
    <ul class="navbar">
        <li class="navitem"><a href="index.html">Home</a></li>
        <li class="navitem"><a href="resume.html" class="active">Resume</a></li>
        <li class="navitem"><a href="links.html">Links</a></li>
    </ul>

    <div class="container">
        <div class="resumeSection">
            <h1 class="resumeHeader">Resume</h1>
            <p class="resumeText">
                Here I've provided both an English and French version of my resume.
                I am actively looking for Summer 2024 internships!
                <br/>
                <br/>
            
                Press the button below to toggle between English and French PDF's.
            </p>
            
            <!-- Toggle button -->
            <button class="pdfDownload" onclick="togglePDF()">
                <span id="toggleLabel">English</span>
            </button>

            <br/><br/>
        </div>

        <!-- iframe to display PDF -->
        <iframe id="pdfViewer"></iframe>
    </div>

    <script>
        var currentLanguage = 'EN'; // Default language
        
        function togglePDF() {
            if (currentLanguage === 'EN') {
                downloadPDF('FR');
                currentLanguage = 'FR';
                document.getElementById('toggleLabel').innerText = 'French';
            } else {
                downloadPDF('EN');
                currentLanguage = 'EN';
                document.getElementById('toggleLabel').innerText = 'English';
            }
        }
        
        function downloadPDF(language) {
            var englishPDFUrl = '../assets/pdf/EN_CarsonSpriggsAudet.pdf';
            var frenchPDFUrl = '../assets/pdf/FR_CarsonSpriggsAudet.pdf';
            
            var downloadUrl = language === 'EN' ? englishPDFUrl : frenchPDFUrl;

            // Set iframe source to the downloaded PDF
            document.getElementById('pdfViewer').src = downloadUrl;
        }
    </script>
</body>
</html>
