<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../styles/styles.css">
    <link rel="stylesheet" type="text/css" href="../styles/fun.css">
    <link rel="stylesheet" type="text/css" href="../styles/resume.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/robot-svgrepo-com.svg"> 
    <title>Portfolio</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script>
        // SOURCED FROM: https://dev.to/mattmarquise/how-to-create-a-custom-circular-cursor-for-your-website-4i7p
        $(document).ready(function() {
            $(document).on('mousemove', function(e) {
                $('#circularcursor').css({
                    left: e.pageX,
                    top: e.pageY
                });
            });
        });
    </script>
</head>
<body>
    
    <div id="circularcursor"></div>
    <ul class="navbar">
        <li class="navitem"><a href="index.html">Home</a></li>
        <li class="navitem"><a href="resume.html" class="active">Resume</a></li>
        <li class="navitem"><a href="links.html">Links</a></li>
    </ul>

    <div class="resumeSection">
        <h1 class="resumeHeader">Resume</h1>
        <p class="resumeText">Here you can download my resume in either English or French.</p>
        
        <!-- EN button with image -->
        <button class="pdfDownload" onclick="downloadPDF('EN')">
            <span>EN</span>
            <img class="downloadImage" src="assets/images/downloadArrow.png">
        </button>
        
        <!-- FR button with image -->
        <button class="pdfDownload" onclick="downloadPDF('FR')">
            <span>FR</span>
            <img class="downloadImage" src="assets/images/downloadArrow.png">
            
        </button>
    </div>

    <script>
        function downloadPDF(language) {
            // You can replace the dummy URLs with the actual URLs of your PDF files
            var englishPDFUrl = '../assets/pdf/EN_CarsonSpriggsAudet.pdf';
            var englishFrenchPDFUrl = '../assets/pdf/FR_CarsonSpriggsAudet.pdf';
            
            var downloadUrl = language === 'EN' ? englishPDFUrl : englishFrenchPDFUrl;

            var link = document.createElement('a');
            link.href = downloadUrl;
            link.download = language + '_CarsonSpriggsAudet.pdf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
